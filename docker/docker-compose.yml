version: "3.9"

services:
  backend:
    build:
      context: ../backend
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 17845 --reload
    ports:
      - "17845:17845"
    environment:
      ONCOWATCH_ENV: development
      ONCOWATCH_BACKEND_HOST: 0.0.0.0
      ONCOWATCH_BACKEND_PORT: 17845
    volumes:
      - ../backend:/app
      - oncowatch-data:/root/.local/share/OncoWatch

volumes:
  oncowatch-data:
