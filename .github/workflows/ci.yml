name: ci

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend
        run: python -m pip install -e ./backend
      - name: Run backend tests
        run: cd backend && PYTHONDONTWRITEBYTECODE=1 python -m unittest discover -s tests -v

  frontend-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Install workspace dependencies
        run: npm ci
      - name: Typecheck frontend
        run: npm run lint
      - name: Build frontend
        run: npm run build:frontend

  frontend-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install workspace dependencies
        run: npm ci
      - name: Install backend
        run: python -m pip install -e ./backend
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Run Playwright smoke test
        run: npm run test:e2e

  macos-desktop-build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: dtolnay/rust-toolchain@stable
      - name: Install workspace dependencies
        run: npm ci
      - name: Install backend build dependencies
        run: python -m pip install -e './backend[build]'
      - name: Cargo check
        run: npm run check:rust
      - name: Build macOS desktop bundle
        run: npm run build:desktop
