name: release

# Ships a signed, notarized macOS build and the auto-update manifest (latest.json)
# whenever a version tag is pushed, e.g.:
#   npm run set:version 0.1.1 && git commit -am "release: v0.1.1"
#   git tag v0.1.1 && git push origin main --tags

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.1)"
        required: true

jobs:
  macos-release:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install workspace dependencies
        run: npm ci

      - name: Install backend build dependencies
        run: python -m pip install -e './backend[build]'

      - name: Build backend sidecar
        run: npm run build:backend-sidecar

      - name: Build, sign, notarize and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          # Update-package signing (minisign) — required for auto-update
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Apple code signing + notarization
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: "Firstlight __VERSION__"
          releaseBody: "See the assets below to download and install Firstlight. Existing installs update automatically."
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          args: --bundles app,dmg
