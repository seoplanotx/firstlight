name: release

# Ships signed installers for macOS and Windows plus the auto-update manifest
# (latest.json) whenever a version tag is pushed, e.g.:
#   npm run set:version 0.1.1 && git commit -am "release: v0.1.1"
#   git tag v0.1.1 && git push origin main --tags
#
# The release is created as a DRAFT by the macOS job, the Windows job appends
# its installer to the same draft, and the publish job flips it live only after
# both platforms have uploaded. That way users never see a half-populated
# release, and the merged latest.json carries both platform signatures.
#
# Updater artifacts (the signed .sig + latest.json the auto-updater needs) are
# OFF in the committed tauri.conf.json so CI verification, local dev, and
# contributor builds don't need the signing key. They are switched ON here, at
# release time only, via the src-tauri/updater.release.json config override.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.1)"
        required: true

jobs:
  macos-release:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install workspace dependencies
        run: npm ci

      - name: Install backend build dependencies
        run: python -m pip install -e './backend[build]'

      - name: Build backend sidecar
        run: npm run build:backend-sidecar

      - name: Build, sign, notarize and publish macOS release
        uses: tauri-apps/tauri-action@v0
        env:
          # Update-package signing (minisign) — required for auto-update
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Apple code signing + notarization
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: "Firstlight __VERSION__"
          releaseBody: "See the assets below to download and install Firstlight. Existing installs update automatically."
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          args: --bundles app,dmg --config src-tauri/updater.release.json

  windows-release:
    # Runs after macOS so the two jobs append to latest.json sequentially
    # instead of racing to overwrite the same release asset.
    needs: macos-release
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install workspace dependencies
        run: npm ci

      - name: Install backend build dependencies
        run: python -m pip install -e "./backend[build]"

      - name: Build backend sidecar
        run: npm run build:backend-sidecar

      # artifact-signing-cli shells out to signtool.exe; the runner's Windows
      # SDK path isn't on PATH by default and the SDK version drifts between
      # runner images, so resolve the newest signtool dynamically and add it.
      - name: Add Windows SDK signtool to PATH
        shell: pwsh
        run: |
          $sdk = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Directory |
            Where-Object { Test-Path "$($_.FullName)\x64\signtool.exe" } |
            Sort-Object Name -Descending | Select-Object -First 1
          if (-not $sdk) { throw "signtool.exe not found in Windows Kits" }
          $toolDir = Join-Path $sdk.FullName "x64"
          Write-Host "Using signtool at: $toolDir"
          Add-Content -Path $env:GITHUB_PATH -Value $toolDir

      - name: Install artifact-signing-cli
        shell: pwsh
        run: |
          $dir = Join-Path $env:RUNNER_TEMP "signing"
          New-Item -ItemType Directory -Force -Path $dir | Out-Null
          Invoke-WebRequest `
            -Uri "https://github.com/Levminer/trusted-signing-cli/releases/download/0.11.0/artifact-signing-cli.exe" `
            -OutFile (Join-Path $dir "artifact-signing-cli.exe")
          Add-Content -Path $env:GITHUB_PATH -Value $dir

      # artifact-signing-cli loads the Azure code-signing dlib through signtool,
      # which needs the .NET 8 runtime present on the machine.
      - name: Setup .NET 8 (artifact-signing-cli dependency)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      # Diagnostic: Tauri swallows the sign command's stderr, so exercise the CLI
      # directly against a copied binary to surface the real Azure error. Never
      # fails the job; it only prints what the signer is actually doing.
      - name: Diagnose artifact-signing-cli
        shell: pwsh
        continue-on-error: true
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          RUST_LOG: trace
          RUST_BACKTRACE: full
        run: |
          $test = Join-Path $env:RUNNER_TEMP "sign-test.exe"
          Copy-Item "dist-sidecar/oncowatch-backend-x86_64-pc-windows-msvc.exe" $test -Force
          Write-Host "=== signtool location ==="
          (Get-Command signtool.exe -ErrorAction SilentlyContinue).Source
          Write-Host "=== installed .NET runtimes ==="
          dotnet --list-runtimes
          Write-Host "=== artifact-signing-cli --help ==="
          artifact-signing-cli --help 2>&1 | Out-String | Write-Host
          Write-Host "=== attempt direct sign ==="
          artifact-signing-cli -e https://eus.codesigning.azure.net -a tc012592 -c firstlight -d Firstlight $test 2>&1 | Out-String | Write-Host
          Write-Host "EXITCODE=$LASTEXITCODE"

      - name: Build and publish Windows release
        uses: tauri-apps/tauri-action@v0
        env:
          # Update-package signing (minisign) — required for auto-update
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # --- Windows code signing (Azure Artifact / Trusted Signing) ---
          # artifact-signing-cli reads these to authenticate as the CI service
          # principal (Artifact Signing Certificate Profile Signer role). The
          # signCommand lives in src-tauri/updater.release.json so only release
          # builds sign; dev/CI-verification builds stay unsigned.
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: "Firstlight __VERSION__"
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          args: --bundles nsis --config src-tauri/updater.release.json

  publish-release:
    # Flip the draft live only after both platform installers are uploaded.
    needs: [macos-release, windows-release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      # Mirror the version-stamped installers to stable, version-less filenames
      # on the same release. The landing page links to these via the
      # /releases/latest/download/<name> redirect, so its download buttons
      # always resolve to the newest release without ever needing an edit.
      - name: Mirror installers to version-less download aliases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          mkdir -p alias
          gh release download "$RELEASE_TAG" --pattern "*_aarch64.dmg" --dir alias
          gh release download "$RELEASE_TAG" --pattern "*_x64-setup.exe" --dir alias
          cp alias/*_aarch64.dmg "alias/Firstlight-latest-macos.dmg"
          cp alias/*_x64-setup.exe "alias/Firstlight-latest-windows-setup.exe"
          gh release upload "$RELEASE_TAG" \
            "alias/Firstlight-latest-macos.dmg" \
            "alias/Firstlight-latest-windows-setup.exe" \
            --clobber

      - name: Publish the release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: gh release edit "$RELEASE_TAG" --draft=false --latest
